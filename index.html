<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zometool 消息通知中心一期原型</title>
  <style>
    :root {
      --phone-w: 932px;
      --phone-h: 460px;
      --blue: #315DFF;
      --blue-soft: #EDF2FF;
      --ink: #172033;
      --muted: #758095;
      --line: #E9EDF5;
      --bg: #EEF2F8;
      --card: #FFFFFF;
      --green: #22B573;
      --orange: #FF9D2E;
      --red: #FF4D5E;
      --purple: #7657FF;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 30% 20%, #F8FAFF 0, #DCE5F4 45%, #C8D3E5 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
    }
    .stage { padding: 28px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .outside-entry { width: var(--phone-w); display: flex; justify-content: flex-end; align-items: center; gap: 12px; color: #4B5874; font-weight: 800; }
    .entry-btn { position: relative; width: 52px; height: 52px; border-radius: 22px; background: rgba(255,255,255,.92); display: grid; place-items: center; font-size: 24px; box-shadow: 0 16px 38px rgba(23,32,51,.16); border: 1px solid rgba(255,255,255,.95); }
    .entry-dot { position: absolute; right: -2px; top: -3px; min-width: 22px; height: 22px; padding: 0 6px; border-radius: 999px; background: #F04452; color: #fff; font-size: 12px; font-weight: 900; display: grid; place-items: center; border: 3px solid #EEF2F8; }
    .phone { width: var(--phone-w); height: var(--phone-h); border-radius: 52px; background: #0D1320; padding: 12px; box-shadow: 0 30px 80px rgba(23,32,51,.35), inset 0 0 0 2px rgba(255,255,255,.08); position: relative; }
    .phone::before { content: ""; position: absolute; left: 50%; top: 8px; transform: translateX(-50%); width: 118px; height: 18px; border-radius: 0 0 14px 14px; background: #0D1320; z-index: 5; }
    .screen { width: 100%; height: 100%; border-radius: 42px; overflow: hidden; background: var(--bg); position: relative; }
    .content { width: 100%; height: 100%; padding: 22px 24px 18px; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 14px; overflow: hidden; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding-right: 4px; }
    .topbar h1 { margin: 0; font-size: 24px; letter-spacing: -.5px; }
    .actions { display: flex; gap: 10px; align-items: center; }
    button { border: 0; border-radius: 999px; height: 34px; padding: 0 14px; background: #fff; color: #43506A; font-weight: 800; cursor: pointer; box-shadow: 0 6px 18px rgba(23,32,51,.08); }
    button.primary { background: var(--blue); color: #fff; }
    .workspace { display: grid; grid-template-columns: 220px minmax(0, 1fr); gap: 14px; min-height: 0; height: 100%; overflow: hidden; }
    .message-panel { min-width: 0; min-height: 0; height: 100%; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
    .panel-hint { display: flex; justify-content: space-between; align-items: center; color: #66738D; font-size: 12px; padding: 0 4px; }
    .list { flex: 1 1 auto; min-height: 0; height: 100%; overflow-y: auto; overflow-x: hidden; padding-right: 6px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    .list::-webkit-scrollbar { width: 6px; }
    .list::-webkit-scrollbar-thumb { background: rgba(49,93,255,.22); border-radius: 999px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .right-nav { background: transparent; border: 0; border-radius: 0; padding: 18px 4px; box-shadow: none; display: flex; flex-direction: column; justify-content: flex-start; gap: 14px; min-height: 0; z-index: 3; }
    .right-nav h2 { margin: 0 0 4px; font-size: 16px; }
    .right-nav p { margin: 0 0 8px; color: var(--muted); font-size: 11px; line-height: 1.45; }
    .nav-tab { min-height: 74px; border-radius: 22px; background: #FFFFFF; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; cursor: pointer; border: 2px solid rgba(49,93,255,.18); transition: .18s ease; box-shadow: 0 12px 28px rgba(38,49,76,.16); }
    .nav-tab.active { background: var(--blue); border-color: var(--blue); box-shadow: 0 16px 34px rgba(49,93,255,.26); }
    .nav-tab .name { display: flex; flex-direction: column; gap: 3px; font-weight: 900; color: #44506A; }
    .nav-tab.active .name { color: #fff; }
    .nav-tab small { color: var(--muted); font-weight: 700; font-size: 10px; }
    .nav-tab.active small { color: rgba(255,255,255,.82); }
    .count { min-width: 25px; height: 25px; padding: 0 7px; border-radius: 999px; background: #fff; color: #66738D; display: grid; place-items: center; font-size: 12px; font-weight: 900; }
    .nav-tab.active .count { background: rgba(255,255,255,.95); color: var(--blue); }
    .swipe-row { position: relative; margin-bottom: 10px; border-radius: 24px; overflow: visible; background: transparent; }
    .delete-action { display: none; }
    .card { width: 100%; background: rgba(255,255,255,.94); border: 1px solid rgba(255,255,255,.95); border-radius: 24px; padding: 12px 14px; display: grid; grid-template-columns: 56px minmax(0, 1fr) auto; gap: 12px; align-items: center; box-shadow: 0 10px 28px rgba(38,49,76,.08); cursor: pointer; position: relative; z-index: 2; transition: border-color .18s ease, box-shadow .18s ease; }
    .card.unread::after { content: ""; position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
    .card.selected { border-color: rgba(49,93,255,.34); box-shadow: 0 12px 30px rgba(49,93,255,.15); }
    .thumb { width: 56px; height: 56px; border-radius: 18px; display: grid; place-items: center; font-size: 23px; background: #F1F4FA; }
    .work-thumb { width: 56px; height: 56px; border-radius: 18px; display: grid; place-items: center; font-size: 25px; color: #fff; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(255,255,255,.28); position: relative; }
    .work-thumb::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.16)); pointer-events: none; }
    .work-thumb.space { background: linear-gradient(135deg, #4B6BFF, #88D8FF); }
    .work-thumb.bridge { background: linear-gradient(135deg, #22B573, #B8F2D4); }
    .work-thumb.dome { background: linear-gradient(135deg, #FF9D2E, #FFE08A); }
    .work-thumb.bird { background: linear-gradient(135deg, #7657FF, #E6B8FF); }
    .work-thumb.fans { background: linear-gradient(135deg, #2D74C4, #9FD8FF); }
    .batch-thumb { width: 56px; height: 56px; border-radius: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 3px; background: rgba(255,255,255,.9); box-shadow: inset 0 0 0 1px rgba(255,255,255,.28); }
    .batch-thumb span { display: grid; place-items: center; border-radius: 10px; color: #fff; font-size: 14px; }
    .batch-thumb .a { background: linear-gradient(135deg, #4B6BFF, #88D8FF); }
    .batch-thumb .b { background: linear-gradient(135deg, #22B573, #B8F2D4); }
    .batch-thumb .c { background: linear-gradient(135deg, #FF9D2E, #FFE08A); }
    .batch-thumb .d { background: linear-gradient(135deg, #7657FF, #E6B8FF); }
    .modal-image {
      height: 118px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 42px;
      margin: 0 0 10px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.24), 0 8px 22px rgba(0,0,0,.18);
      cursor: zoom-in;
      position: relative;
      overflow: hidden;
    }
    .modal-split {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 18px;
      min-height: 220px;
      align-items: stretch;
    }
    .modal-split-image {
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 74px;
      cursor: zoom-in;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.28), 0 10px 28px rgba(0,0,0,.24);
    }
    .modal-split-image::after { content: "点击放大预览"; position: absolute; right: 10px; bottom: 8px; font-size: 12px; padding: 4px 8px; border-radius: 999px; background: rgba(0,0,0,.35); color: rgba(255,255,255,.9); }
    .modal-split-info { display: flex; flex-direction: column; min-width: 0; }
    .modal-image::after { content: "点击放大预览"; position: absolute; right: 10px; bottom: 8px; font-size: 12px; padding: 4px 8px; border-radius: 999px; background: rgba(0,0,0,.35); color: rgba(255,255,255,.9); }
    .preview-mask {
      position: absolute;
      inset: 0;
      background: rgba(3, 8, 18, .82);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 12;
    }
    .preview-mask.show { display: flex; }
    .preview-box {
      width: 680px;
      height: 330px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 92px;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,.5), inset 0 0 0 2px rgba(255,255,255,.22);
      overflow: hidden;
    }
    .preview-box::after { content: attr(data-title); position: absolute; left: 0; right: 0; bottom: 0; padding: 14px 18px; font-size: 18px; font-weight: 900; background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.42)); }
    .preview-close { position: absolute; right: 28px; top: 24px; color: #fff; font-size: 38px; font-weight: 900; cursor: pointer; z-index: 13; text-shadow: 0 0 14px rgba(114,190,255,.8); }
    .model-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 4px 0 12px; }
    .model-item { height: 78px; border-radius: 14px; display: grid; place-items: center; color: #fff; font-size: 30px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.24); position: relative; overflow: hidden; }
    .model-item small { position: absolute; left: 0; right: 0; bottom: 0; padding: 5px 4px; font-size: 11px; text-align: center; background: rgba(0,0,0,.28); }
    .model-more { margin-top: -4px; color: rgba(234,244,255,.82); font-size: 13px; text-align: center; }
    .thumb.blue { background: linear-gradient(135deg, #DDE7FF, #B6CAFF); }
    .thumb.green { background: linear-gradient(135deg, #DDF9EA, #A9E9CB); }
    .thumb.orange { background: linear-gradient(135deg, #FFF0D8, #FFD19A); }
    .thumb.purple { background: linear-gradient(135deg, #EEE8FF, #C7BAFF); }
    .card h3 { margin: 0; font-size: 15px; line-height: 1.22; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card.unread h3 { font-weight: 900; }
    .card p { margin: 5px 0 0; color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { text-align: right; color: var(--muted); font-size: 11px; display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
    .pill { border-radius: 999px; padding: 4px 8px; font-size: 11px; font-weight: 900; white-space: nowrap; }
    .pill.system { color: var(--blue); background: var(--blue-soft); }
    .pill.feedback { color: #15845A; background: #E6F8EF; }

    .modal-mask {
      position: absolute;
      inset: 0;
      background: rgba(5, 12, 28, .66);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 8;
    }
    .modal-mask.show { display: flex; }
    .mail-modal {
      width: 680px;
      max-height: 360px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(48,78,121,.98), rgba(33,58,96,.98));
      border: 2px solid rgba(113,172,239,.50);
      box-shadow: 0 22px 70px rgba(0,0,0,.42), inset 0 0 0 1px rgba(255,255,255,.08);
      position: relative;
      padding: 22px 30px 20px;
      color: #EAF4FF;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .mail-modal::before {
      content: "";
      position: absolute;
      left: -22px;
      top: -28px;
      width: 190px;
      height: 52px;
      background: radial-gradient(circle at 30% 50%, rgba(75,161,255,.75), rgba(75,161,255,0) 70%);
      opacity: .75;
    }
    .modal-close {
      position: absolute;
      right: 18px;
      top: 12px;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #DDF1FF;
      font-size: 30px;
      font-weight: 900;
      cursor: pointer;
      text-shadow: 0 0 14px rgba(114,190,255,.8);
      z-index: 2;
    }
    .modal-title {
      margin: 0 46px 14px 0;
      font-size: 17px;
      line-height: 1.3;
      font-weight: 900;
      letter-spacing: .2px;
    }
    .modal-row { display: grid; grid-template-columns: 48px 1fr; gap: 10px; margin-bottom: 10px; align-items: start; }
    .modal-label { color: rgba(234,244,255,.72); font-weight: 900; font-size: 15px; padding-top: 6px; }
    .modal-content-box {
      min-height: 76px;
      border: 1px solid rgba(75,132,198,.52);
      background: rgba(15,35,66,.54);
      color: rgba(234,244,255,.92);
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .reward-box { display: grid; place-items: center; margin: 8px 0 14px; }
    .reward-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(15,35,66,.45);
      display: grid;
      place-items: center;
      font-size: 40px;
      box-shadow: inset 0 0 0 1px rgba(75,132,198,.4);
      position: relative;
    }
    .reward-icon span { position: absolute; right: 8px; bottom: 8px; font-size: 16px; color: #fff; font-weight: 900; text-shadow: 0 2px 5px rgba(0,0,0,.5); }
    .reward-name { margin-top: 7px; color: rgba(234,244,255,.8); font-size: 13px; }
    .banner-box {
      height: 168px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,115,92,.92), rgba(96,190,255,.95));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.25);
      margin: 4px 0 12px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 800;
      text-shadow: 0 2px 8px rgba(0,0,0,.38);
    }
    .banner-box::before {
      content: "⚔️  🧩  🚀  ⭐";
      position: absolute;
      left: 30px;
      top: 28px;
      font-size: 46px;
      letter-spacing: 22px;
      opacity: .92;
    }
    .modal-actions { display: flex; justify-content: center; gap: 16px; margin-top: auto; padding-top: 10px; }
    .game-btn {
      min-width: 128px;
      height: 40px;
      border-radius: 6px;
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.16), 0 6px 18px rgba(0,0,0,.22);
    }
    .game-btn.gold { background: linear-gradient(180deg, #D9BB6A, #A97A2F); }
    .game-btn.blue { background: linear-gradient(180deg, #327EC4, #1D5B94); }

    .confirm-modal {
      width: 420px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(48,78,121,.98), rgba(33,58,96,.98));
      border: 2px solid rgba(113,172,239,.5);
      box-shadow: 0 22px 70px rgba(0,0,0,.42), inset 0 0 0 1px rgba(255,255,255,.08);
      color: #EAF4FF;
      padding: 26px 28px 22px;
      text-align: center;
    }
    .confirm-modal h3 { margin: 0 0 12px; font-size: 20px; }
    .confirm-modal p { margin: 0 0 22px; color: rgba(234,244,255,.82); font-size: 15px; }
    .toast { position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%) translateY(20px); background: rgba(13,19,32,.88); color: #fff; border-radius: 999px; padding: 9px 16px; font-size: 13px; font-weight: 800; opacity: 0; pointer-events: none; transition: .2s ease; z-index: 10; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .hint-pop { position: fixed; z-index: 20; max-width: 290px; padding: 12px 14px; border-radius: 16px; background: rgba(13,19,32,.92); color: #fff; font-size: 12px; line-height: 1.55; box-shadow: 0 16px 40px rgba(13,19,32,.28); opacity: 0; transform: translateY(8px); pointer-events: none; transition: opacity .18s ease, transform .18s ease; }
    .hint-pop.show { opacity: 1; transform: translateY(0); }
    .hint-pop strong { display: block; font-size: 13px; margin-bottom: 4px; }
    .hint-pop .logic { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,.18); color: rgba(255,255,255,.86); }
    .hint-pop .logic b { color: #fff; }
    @media (max-width: 980px) { .stage { transform: scale(.86); } }
  </style>
</head>
<body>
  <div class="stage">
    <div class="outside-entry">
      <span>消息通知入口</span>
      <div class="entry-btn hintable" data-hint-title="消息通知入口" data-hint="展示未读红点。点击入口后进入消息通知中心。" data-logic="未读数 > 0 时显示红点；点击消息或全部已读后更新红点。">🔔<span class="entry-dot" id="sideBadge">8</span></div>
    </div>
    <div class="phone">
      <div class="screen">
        <main class="content">
          <header class="topbar">
            <h1>消息通知</h1>
            <div class="actions">
              <button id="markRead" class="hintable" data-hint-title="一键已读" data-hint="将所有未读消息标记为已读。" data-logic="批量更新 read_status=read，并同步刷新入口未读数。">一键已读</button>
              <button class="primary hintable" id="quickDelete" data-hint-title="删除已读" data-hint="删除所有已读消息。" data-logic="点击后先弹出确认弹窗；确认后只删除 read_status=read 的消息。">删除已读</button>
            </div>
          </header>
          <section class="workspace">
            <aside class="right-nav hintable" data-hint-title="左侧分类导航" data-hint="用于切换消息列表的分类，不再展示详情区。" data-logic="选择导航后只刷新右侧消息列表；默认选中当前分类最新未读消息。">
              <div class="nav-tab active hintable" data-tab="all" data-hint-title="全部" data-hint="展示系统和互动反馈全部消息。" data-logic="不额外过滤 category，按 created_at 倒序排列。"><span class="name">📬 全部<small>所有消息</small></span><span class="count">12</span></div>
              <div class="nav-tab hintable" data-tab="system" data-hint-title="系统" data-hint="展示 UGC 更新、营销、造型库、课程、审核和成就类消息。" data-logic="筛选 category=system；UGC 更新归入系统类。"><span class="name">🔔 系统<small>更新/审核/成就</small></span><span class="count">6</span></div>
              <div class="nav-tab hintable" data-tab="feedback" data-hint-title="互动反馈" data-hint="展示造型库和作品圈的互动反馈。" data-logic="筛选 category=interaction；标题用 [造型库]/[作品圈] 标记来源。"><span class="name">💬 互动反馈<small>点赞/收藏/评论</small></span><span class="count">6</span></div>
            </aside>
            <div class="message-panel">
              <div class="panel-hint"><span id="listTitle">全部消息</span><span>点击消息查看详情</span></div>
              <div class="list" id="list"></div>
            </div>
          </section>
        </main>
        <div class="modal-mask" id="modalMask"><div class="mail-modal" id="mailModal"></div></div>
        <div class="modal-mask" id="confirmMask"><div class="confirm-modal"><h3>删除已读</h3><p>确定删除所有已读信息吗？</p><div class="modal-actions"><button class="game-btn blue" onclick="closeQuickDeleteConfirm()">取消</button><button class="game-btn gold" onclick="confirmQuickDelete()">确定</button></div></div></div>
        <div class="preview-mask" id="previewMask"><div class="preview-close" onclick="closeImagePreview()">×</div><div class="preview-box" id="previewBox"></div></div>
        <div class="toast" id="toast">已全部标记为已读</div>
        <div class="hint-pop" id="hintPop"></div>
      </div>
    </div>
  </div>

<script>
const messages = [
  {id:1, tab:'system', unread:true, icon:'🎯', color:'orange', title:'新一期活动招募开始啦', text:'新一期拼搭活动正在招募中', time:'刚刚', tag:'系统', modalType:'banner', body:'新一期拼搭活动正在招募中，点击去看看可查看活动规则和参与入口。'},
  {id:2, tab:'system', unread:true, icon:'🖼️', color:'orange', title:'新作品集上线了', text:'官方新作品集已上线', time:'8分钟前', tag:'系统', modalType:'banner', body:'官方新作品集已上线，收录多个优秀拼搭作品。'},

let currentTab = 'all';
let currentId = null;
let openSwipeId = null;
let dragState = null;
const list = document.getElementById('list');
const toast = document.getElementById('toast');
const sideBadge = document.getElementById('sideBadge');
const listTitle = document.getElementById('listTitle');
const hintPop = document.getElementById('hintPop');
const modalMask = document.getElementById('modalMask');
const mailModal = document.getElementById('mailModal');
const previewMask = document.getElementById('previewMask');
const confirmMask = document.getElementById('confirmMask');
const previewBox = document.getElementById('previewBox');
let hintTimer = null;
function filtered(){ return currentTab === 'all' ? messages : messages.filter(m => m.tab === currentTab); }
function pickDefaultMessage(){ const data = filtered(); return data.find(m => m.unread) || data[0] || null; }
function ensureCurrentMessage(){ const data = filtered(); if(!data.length){ currentId = null; return; } if(!data.find(m => m.id === currentId)) currentId = pickDefaultMessage().id; }
function renderList(){
  ensureCurrentMessage();
  const data = filtered();
  listTitle.textContent = currentTab === 'all' ? '全部消息' : currentTab === 'system' ? '系统消息' : '互动反馈';
  if(!data.length){ list.innerHTML = '<div style="height:100%;display:grid;place-items:center;color:#758095;font-weight:800;">暂无消息</div>'; return; }
  list.innerHTML = data.map(m => `
    <div class="swipe-row" data-id="${m.id}">
      <article class="card ${m.unread ? 'unread' : ''} ${currentId === m.id ? 'selected' : ''} hintable" data-id="${m.id}" data-hint-title="消息条" data-hint="点击消息条会打开弹窗。" data-logic="不同模块使用不同弹窗模板：奖励型、图文活动型、评论/文本型。">
        ${m.modalType === 'modelBatch' ? `<div class="batch-thumb"><span class="a">🏗️</span><span class="b">🌉</span><span class="c">🎡</span><span class="d">🚀</span></div>` : (m.workClass ? `<div class="work-thumb ${m.workClass}">${m.workIcon || m.icon}</div>` : `<div class="thumb ${m.color}">${m.icon}</div>`)}
        <div><h3>${m.title}</h3><p>${m.text}</p></div>
        <div class="meta"><span>${m.time}</span><span class="pill ${m.tab === 'system' ? 'system' : 'feedback'}">${m.tag}</span></div>
      </article>
    </div>`).join('');
  document.querySelectorAll('.card').forEach(card => card.onclick = () => selectMessage(Number(card.dataset.id)));
  bindHints();
}
function bindSwipeRows(){}
function selectMessage(id){ currentId = id; const m = messages.find(x => x.id === id); if(m) m.unread = false; updateBadges(); renderList(); openMessageModal(m); }
function deleteMessage(id){ const index = messages.findIndex(m => m.id === id); if(index >= 0) messages.splice(index, 1); if(currentId === id) currentId = pickDefaultMessage()?.id || null; openSwipeId = null; updateBadges(); renderList(); showToast('消息已删除'); }

function openMessageModal(m){
  if(!m) return;
  clearTimeout(hintTimer);
  hideHint();
  const type = m.modalType || (m.tab === 'system' ? 'text' : 'comment');
  const body = m.body || m.text;
  if(type === 'modelBatch'){
    mailModal.innerHTML = `<div class="modal-close" onclick="closeMessageModal()">×</div><h3 class="modal-title">${m.title}</h3><div class="modal-content-box" style="min-height:auto;margin-bottom:10px;">${body}</div><div class="model-gallery"><div class="model-item" style="background:linear-gradient(135deg,#4B6BFF,#88D8FF);">🏗️<small>天空塔</small></div><div class="model-item" style="background:linear-gradient(135deg,#22B573,#B8F2D4);">🌉<small>三角桥</small></div><div class="model-item" style="background:linear-gradient(135deg,#FF9D2E,#FFE08A);">🎡<small>摩天轮</small></div><div class="model-item" style="background:linear-gradient(135deg,#7657FF,#E6B8FF);">🚀<small>火箭站</small></div></div><div class="model-more">仅展示 4 个代表造型，完整 36 个可进入造型库查看</div><div class="modal-actions"><button class="game-btn blue" onclick="deleteMessage(${m.id}); closeMessageModal();">删除</button><button class="game-btn gold" onclick="closeMessageModal(); showToast('进入造型库')">去看看</button></div>`;
  } else if(type === 'banner'){
    mailModal.innerHTML = `<div class="modal-close" onclick="closeMessageModal()">×</div><h3 class="modal-title">${m.title}</h3><div class="banner-box">${body}</div><div class="modal-actions"><button class="game-btn blue" onclick="deleteMessage(${m.id}); closeMessageModal();">删除</button><button class="game-btn gold" onclick="closeMessageModal(); showToast('进入目标页面')">去看看</button></div>`;
  } else if(type === 'reward'){
    mailModal.innerHTML = `<div class="modal-close" onclick="closeMessageModal()">×</div><h3 class="modal-title">提示</h3><div class="modal-row"><div class="modal-label">标题</div><div class="modal-content-box" style="min-height:auto;">${m.title}</div></div><div class="modal-row"><div class="modal-label">内容</div><div class="modal-content-box">${body}</div></div><div class="reward-box"><div class="reward-icon">${m.reward || '💎'}<span>100</span></div><div class="reward-name">${m.rewardName || '奖励'}</div></div><div class="modal-actions"><button class="game-btn gold" onclick="closeMessageModal(); showToast('已领取')">领取</button></div>`;
  } else if(type === 'reviewFail'){
    const bg = m.imgStyle || 'linear-gradient(135deg,#FF9D2E,#FFE08A)';
    mailModal.innerHTML = `<div class="modal-close" onclick="closeMessageModal()">×</div><h3 class="modal-title">作品暂未通过审核</h3><div class="modal-split"><div class="modal-split-image" style="background:${bg}" onclick="openImagePreview('${m.workIcon || m.icon}', '${m.title.replace(/'/g, "\'")}', '${bg.replace(/'/g, "\'")}')">${m.workIcon || m.icon}</div><div class="modal-split-info"><div class="modal-row"><div class="modal-label">标题</div><div class="modal-content-box" style="min-height:auto;">${m.title}</div></div><div class="modal-row"><div class="modal-label">原因</div><div class="modal-content-box">${body}</div></div><div class="modal-actions"><button class="game-btn blue" onclick="deleteMessage(${m.id}); closeMessageModal();">删除</button><button class="game-btn gold" onclick="closeMessageModal(); showToast('进入修改页')">去修改</button></div></div></div>`;
  } else {
    const action = type === 'comment' ? '查看评论' : '去查看';
    if(m.workClass){
      const bg = m.imgStyle || 'linear-gradient(135deg,#4B6BFF,#88D8FF)';
      mailModal.innerHTML = `<div class="modal-close" onclick="closeMessageModal()">×</div><h3 class="modal-title">提示</h3><div class="modal-split"><div class="modal-split-image" style="background:${bg}" onclick="openImagePreview('${m.workIcon || m.icon}', '${m.title.replace(/'/g, "\'")}', '${bg.replace(/'/g, "\'")}')">${m.workIcon || m.icon}</div><div class="modal-split-info"><div class="modal-row"><div class="modal-label">标题</div><div class="modal-content-box" style="min-height:auto;">${m.title}</div></div><div class="modal-row"><div class="modal-label">内容</div><div class="modal-content-box">${body}</div></div><div class="modal-actions"><button class="game-btn blue" onclick="deleteMessage(${m.id}); closeMessageModal();">删除</button><button class="game-btn gold" onclick="closeMessageModal(); showToast('进入目标页面')">${action}</button></div></div></div>`;
    } else {
      mailModal.innerHTML = `<div class="modal-close" onclick="closeMessageModal()">×</div><h3 class="modal-title">提示</h3><div class="modal-row"><div class="modal-label">标题</div><div class="modal-content-box" style="min-height:auto;">${m.title}</div></div><div class="modal-row"><div class="modal-label">内容</div><div class="modal-content-box">${body}</div></div><div class="modal-actions"><button class="game-btn blue" onclick="deleteMessage(${m.id}); closeMessageModal();">删除</button><button class="game-btn gold" onclick="closeMessageModal(); showToast('进入目标页面')">${action}</button></div>`;
    }
  }
  modalMask.classList.add('show');
}
function closeMessageModal(){ modalMask.classList.remove('show'); }
function openImagePreview(icon, title, bg){
  previewBox.textContent = icon;
  previewBox.dataset.title = title;
  previewBox.style.background = bg;
  previewMask.classList.add('show');
}
function closeImagePreview(){ previewMask.classList.remove('show'); }
modalMask.addEventListener('click', e => { if(e.target === modalMask) closeMessageModal(); });
previewMask.addEventListener('click', e => { if(e.target === previewMask) closeImagePreview(); });

function openQuickDeleteConfirm(){
  clearTimeout(hintTimer);
  hideHint();
  confirmMask.classList.add('show');
}
function closeQuickDeleteConfirm(){ confirmMask.classList.remove('show'); }
function confirmQuickDelete(){
  for(let i = messages.length - 1; i >= 0; i--){ if(!messages[i].unread) messages.splice(i, 1); }
  currentId = pickDefaultMessage()?.id || null;
  closeQuickDeleteConfirm();
  updateBadges();
  renderList();
  showToast('已删除所有已读消息');
}
confirmMask.addEventListener('click', e => { if(e.target === confirmMask) closeQuickDeleteConfirm(); });
function updateBadges(){
  const unread = messages.filter(m => m.unread).length;
  sideBadge.textContent = unread; sideBadge.style.display = unread ? 'grid' : 'none';
  const counts = {all:messages.length, system:messages.filter(m=>m.tab==='system').length, feedback:messages.filter(m=>m.tab==='feedback').length};
  document.querySelectorAll('.nav-tab').forEach(t => t.querySelector('.count').textContent = counts[t.dataset.tab]);
}
function showToast(text){ toast.textContent = text; toast.classList.add('show'); setTimeout(()=>{toast.classList.remove('show'); toast.textContent='已全部标记为已读';},1200); }
function bindHints(){
  document.querySelectorAll('.hintable').forEach(el => {
    if(el.dataset.hintBound) return; el.dataset.hintBound = '1';
    el.addEventListener('mouseenter', e => { clearTimeout(hintTimer); hintTimer = setTimeout(()=>showHint(el,e),1000); });
    el.addEventListener('mousemove', e => { if(hintPop.classList.contains('show')) positionHint(e); });
    el.addEventListener('mouseleave', () => { clearTimeout(hintTimer); hideHint(); });
  });
}
function showHint(el,e){ if(modalMask.classList.contains('show')) return; const title=el.dataset.hintTitle||'功能说明', text=el.dataset.hint||'暂无说明', logic=el.dataset.logic||'按当前模块规则处理。'; hintPop.innerHTML=`<strong>${title}</strong>${text}<div class="logic"><b>逻辑：</b>${logic}</div>`; positionHint(e); hintPop.classList.add('show'); }
function positionHint(e){ const pad=14, rectW=290; const x=Math.min(window.innerWidth-rectW-pad,e.clientX+14); const y=Math.min(window.innerHeight-100,e.clientY+16); hintPop.style.left=Math.max(pad,x)+'px'; hintPop.style.top=Math.max(pad,y)+'px'; }
function hideHint(){ hintPop.classList.remove('show'); }
document.querySelectorAll('.nav-tab').forEach(t => t.onclick = () => { currentTab=t.dataset.tab; document.querySelectorAll('.nav-tab').forEach(x=>x.classList.toggle('active',x===t)); currentId = pickDefaultMessage()?.id || null; openSwipeId=null; renderList(); });
document.getElementById('markRead').onclick = () => { messages.forEach(m=>m.unread=false); updateBadges(); renderList(); showToast('已全部标记为已读'); };
document.getElementById('quickDelete').onclick = openQuickDeleteConfirm;
currentId = pickDefaultMessage()?.id || null; updateBadges(); renderList(); bindHints();
</script>
